<!DOCTYPE html>
<html>

<head>
    <title>Formulário</title>
</head>

<body>
    <ul>
        <li>
            <a href="index.html">Home</a>
        </li>
    </ul>
    <ul>
        <li>
            <a href="listas.html">Listas</a>
        </li>
    </ul>
    <ul>
        <li>
            <a href="tabela.html">Tabela</a>
        </li>
    </ul>
    <ul>
        <li>
            <a href="img.html">Imagens</a>
        </li>
    </ul>

    <h2>FORMULÁRIO</h2>

    <form>
        <div>
            <label for="usuario">Usuário: </label>
            <input type="text" name="usuario" id="usuario">
        </div>

        <br>

        <div>
            <label for="senha">Senha: </label>
            <input type="password" name="senha" id="senha">
        </div>

        <br>


        <div>
            <label for="nome">Nome: </label>
            <input type="text" id="nome" name="nome">
        </div>

        <br>

        <div>
            <label for="email">
                Email: <input type="email">

            </label>

        </div>

        <br>

        <div>
            <label for="peso">
                Peso: <input type="number" min="0" max="200" step="0.5">
            </label>
        </div>

        <br>

        <div>
            <label for="volume">
                Volume: <input type="range" min="0" max="100" step="20">
            </label>
        </div>

        <br>

        <div>
            <fieldset>
                <Legend> Estado Civil</Legend>
                <p>
                    <label>
                        <input type="radio" name="est_civil" value="casado">Casado
                    </label>
                </p>
                <p>
                    <label>
                        <input type="radio" name="est_civil" value="solteiro">Solteiro
                    </label>
                </p>
                <p>
                    <label>
                        <input type="radio" name="est_civil" value="divorciado">Divorciado
                    </label>
                </p>
            </fieldset>
        </div>



        <div>
            <fieldset>
                <legend>Produtos</legend>
                <p>
                    <label>
                        <input type="checkbox" name="computador" value="computador">Computador
                    </label>
                </p>
                <p>
                    <label>
                        <input type="checkbox" name="impressora" value="impressora">Impressora
                    </label>
                </p>
                <p>
                    <label>
                        <input type="checkbox" name="monitor" value="monitor">Monitor
                    </label>
                </p>
            </fieldset>
        </div>

        <div>
            <fieldset>
                <legend>Profissão</legend>
                <p>
                    <input type="radio" name="profissao" value="desempregado"> Desempregado
                </p>
            </fieldset>
        </div>

        <br>

        <div>
            <p>
                <label>
                    Site: <input type="url" list="sites" name="link">
                </label>
            </p>
            <datalist id="sites">
                <option label="Portal Unipam" value="https://portal.unipam.edu.br/login"></option>

                <option label="Virtual IF" value="https://virtualif.iftm.edu.br/VRTL/"></option>

                <option label="Git Hub" value="https://github.com/"></option>
            </datalist>
        </div>

        <br>
        
        <div>
            <p>
                <label>
                    Deixe sua sugestão:
                    <textarea cols="30" rows="5"></textarea>
                </label>
            </p>
        </div>
        <div>
            <label for="dataEvento">Data do evento: </label>
            <input type="date" name="dataEvento" id="dataEvento">
        </div>

        <br>

        <div>
            <label for="">
                Telefone:
                <input type="tel" required placeholder="(XX)XXXXX-XXXX">
            </label>
        </div>

        <br>

        <div>
            <label for="numero">Idade: </label>
            <input type="number" min="0" max="100" id="numero" number="numero">
        </div>

        <br>

        <div>
            <label for="cores"> Cor favorita: </label>
            <input type="color">
        </div>

        <br>



        <button type="submit"> Enviar</button>
    </form>
</body>

</html>
